<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محاسبه وام</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f0b429">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="محاسبه وام">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --card: #161b22; --card2: #1c2333; --border: #30363d;
    --gold: #f0b429; --gold2: #e09b10; --text: #e6edf3; --muted: #8b949e;
    --green: #3fb950; --red: #f85149; --blue: #58a6ff;
  }
  body {
    font-family: 'Vazirmatn', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1rem;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(240,180,41,0.05) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(88,166,255,0.05) 0%, transparent 50%);
  }
  header { text-align: center; margin-bottom: 2.5rem; }
  header h1 {
    font-size: 2.2rem; font-weight: 900; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--gold), #fff 60%, var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  header p { color: var(--muted); margin-top: 0.4rem; font-size: 0.95rem; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 2rem; width: 100%; max-width: 560px; box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  .unknown-selector {
    display: flex; gap: 0.5rem; margin-bottom: 2rem;
    background: var(--bg); border-radius: 10px; padding: 0.3rem; border: 1px solid var(--border);
  }
  .unknown-selector button {
    flex: 1; padding: 0.65rem 0.5rem; border: none; border-radius: 8px;
    font-family: 'Vazirmatn', sans-serif; font-size: 0.8rem; font-weight: 500;
    cursor: pointer; background: transparent; color: var(--muted); transition: all 0.2s; line-height: 1.4;
  }
  .unknown-selector button.active {
    background: var(--gold); color: #000; font-weight: 700; box-shadow: 0 2px 12px rgba(240,180,41,0.35);
  }
  .field { margin-bottom: 1.3rem; }
  .field label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; color: var(--muted); margin-bottom: 0.5rem; font-weight: 500; }
  .field label .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
  .field label .dot.unknown-dot { background: var(--blue); box-shadow: 0 0 8px var(--blue); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .field input {
    width: 100%; background: var(--card2); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 0.8rem 1rem; font-family: 'Vazirmatn', sans-serif; font-size: 1.05rem;
    color: var(--text); transition: border-color 0.2s, box-shadow 0.2s; outline: none; text-align: right;
  }
  .field input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(240,180,41,0.12); }
  .field input:disabled {
    background: rgba(88,166,255,0.08); border-color: var(--blue); color: var(--blue);
    font-weight: 700; font-size: 1.1rem; cursor: not-allowed;
  }
  .field .hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; opacity: 0.7; }
  .calc-btn {
    width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--gold), var(--gold2));
    border: none; border-radius: 12px; font-family: 'Vazirmatn', sans-serif; font-size: 1.05rem;
    font-weight: 700; color: #000; cursor: pointer; margin-top: 0.5rem;
    transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 20px rgba(240,180,41,0.3);
  }
  .calc-btn:active { transform: translateY(1px); }
  .result-box {
    margin-top: 1.5rem; background: linear-gradient(135deg, rgba(88,166,255,0.08), rgba(240,180,41,0.06));
    border: 1px solid rgba(88,166,255,0.25); border-radius: 14px; padding: 1.5rem; display: none;
  }
  .result-box.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .result-title { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; font-weight: 500; letter-spacing: 1px; }
  .result-main { font-size: 2rem; font-weight: 900; color: var(--gold); margin-bottom: 1.2rem; line-height: 1; }
  .result-main span { font-size: 1rem; font-weight: 400; color: var(--muted); margin-right: 0.4rem; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
  .result-item { background: var(--card); border-radius: 10px; padding: 0.8rem; border: 1px solid var(--border); }
  .result-item .label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem; }
  .result-item .value { font-size: 1rem; font-weight: 700; color: var(--text); }
  .result-item .value.green { color: var(--green); }
  .result-item .value.red { color: var(--red); }
  .error-msg {
    margin-top: 1rem; padding: 0.8rem 1rem; background: rgba(248,81,73,0.1);
    border: 1px solid rgba(248,81,73,0.3); border-radius: 10px; color: var(--red); font-size: 0.88rem; display: none;
  }
  .error-msg.show { display: block; }
  .amortization-toggle {
    background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 1rem;
    font-family: 'Vazirmatn', sans-serif; font-size: 0.82rem; color: var(--muted); cursor: pointer;
    width: 100%; transition: all 0.2s; margin-top: 0.8rem;
  }
  .amortization-table { display: none; margin-top: 1rem; overflow: auto; max-height: 260px; border-radius: 10px; border: 1px solid var(--border); }
  .amortization-table.show { display: block; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th { background: var(--card2); padding: 0.6rem 0.8rem; text-align: right; color: var(--muted); font-weight: 600; position: sticky; top: 0; z-index: 1; border-bottom: 1px solid var(--border); }
  td { padding: 0.55rem 0.8rem; border-bottom: 1px solid rgba(48,54,61,0.5); }
  tr:last-child td { border-bottom: none; }
  tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
  .td-interest { color: var(--red); }
  .td-principal { color: var(--green); }
</style>
</head>
<body>
<header>
  <h1>ماشین حساب وام</h1>
  <p>مجهولت رو انتخاب کن، بقیه رو بده تا حساب کنم</p>
</header>
<div class="card">
  <div class="unknown-selector">
    <button class="active" onclick="setUnknown('monthly')">قسط<br>ماهانه</button>
    <button onclick="setUnknown('rate')">نرخ<br>بهره</button>
    <button onclick="setUnknown('principal')">مبلغ<br>وام</button>
    <button onclick="setUnknown('months')">مدت<br>بازپرداخت</button>
  </div>
  <div class="field" id="field-principal">
    <label><span class="dot" id="dot-principal"></span>مبلغ وام (دلار)</label>
    <input type="text" inputmode="numeric" id="principal" placeholder="مثلاً: 300,000" autocomplete="off">
  </div>
  <div class="field" id="field-rate">
    <label><span class="dot" id="dot-rate"></span>نرخ بهره سالانه (%)</label>
    <input type="text" inputmode="decimal" id="rate" placeholder="مثلاً: 5.5" autocomplete="off">
  </div>
  <div class="field" id="field-months">
    <label><span class="dot" id="dot-months"></span>مدت بازپرداخت (ماه)</label>
    <input type="text" inputmode="numeric" id="months" placeholder="مثلاً: 300 (۲۵ سال)" autocomplete="off">
    <div class="hint">۱۲ ماه = ۱ سال &nbsp;|&nbsp; ۳۰۰ ماه = ۲۵ سال</div>
  </div>
  <div class="field" id="field-monthly">
    <label><span class="dot" id="dot-monthly"></span>قسط ماهانه (دلار)</label>
    <input type="text" inputmode="numeric" id="monthly" placeholder="مثلاً: 1,800" autocomplete="off">
  </div>
  <button class="calc-btn" onclick="calculate()">📊 محاسبه کن</button>
  <div class="error-msg" id="error-msg"></div>
  <div class="result-box" id="result-box">
    <div class="result-title">نتیجه محاسبه</div>
    <div class="result-main" id="result-main"></div>
    <div class="result-grid" id="result-grid"></div>
    <button class="amortization-toggle" id="amort-toggle" onclick="toggleAmort()">جدول اقساط ▼</button>
    <div class="amortization-table" id="amort-table"></div>
  </div>
</div>
<script>
let unknown = 'monthly';

function addCommas(val) {
  val = val.replace(/,/g, '');
  if (!val) return '';
  const parts = val.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return parts.join('.');
}

function getRaw(id) {
  return parseFloat(document.getElementById(id).value.replace(/,/g, ''));
}

function setupCommaInput(id) {
  const input = document.getElementById(id);
  input.addEventListener('input', function() {
    if (this.disabled) return;
    const pos = this.selectionStart;
    const oldLen = this.value.length;
    this.value = addCommas(this.value.replace(/[^0-9.]/g, ''));
    const newLen = this.value.length;
    this.setSelectionRange(pos + (newLen - oldLen), pos + (newLen - oldLen));
  });
}

['principal','monthly','months','rate'].forEach(id => setupCommaInput(id));

function setUnknown(type) {
  unknown = type;
  document.querySelectorAll('.unknown-selector button').forEach((b, i) => {
    const types = ['monthly','rate','principal','months'];
    b.classList.toggle('active', types[i] === type);
  });
  ['principal','rate','months','monthly'].forEach(id => {
    const input = document.getElementById(id);
    const dot = document.getElementById('dot-' + id);
    if (id === type) {
      input.disabled = true; input.value = ''; input.placeholder = '← اینو حساب میکنم';
      dot.className = 'dot unknown-dot';
    } else {
      input.disabled = false; dot.className = 'dot';
      const p = { principal:'مثلاً: 300,000', rate:'مثلاً: 5.5', months:'مثلاً: 300 (۲۵ سال)', monthly:'مثلاً: 1,800' };
      input.placeholder = p[id];
    }
  });
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('error-msg').classList.remove('show');
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('result-box').classList.remove('show');
}

function fmt(n) { return n.toLocaleString('en-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

function calcMonthly(P, annualRate, n) {
  const r = annualRate / 100 / 12;
  if (r === 0) return P / n;
  return P * r * Math.pow(1+r, n) / (Math.pow(1+r, n) - 1);
}
function calcRate(P, M, n) {
  let r = 0.005;
  for (let i = 0; i < 1000; i++) {
    const f = P * r * Math.pow(1+r,n) / (Math.pow(1+r,n)-1) - M;
    const df = (P * (Math.pow(1+r,n) * (1 + r*n - r*n/(1+r)) - 1)) / Math.pow(Math.pow(1+r,n)-1, 2);
    const r2 = r - f/df;
    if (Math.abs(r2 - r) < 1e-10) { r = r2; break; }
    r = r2; if (r <= 0) return null;
  }
  return r * 12 * 100;
}
function calcPrincipal(M, annualRate, n) {
  const r = annualRate / 100 / 12;
  if (r === 0) return M * n;
  return M * (Math.pow(1+r,n)-1) / (r * Math.pow(1+r,n));
}
function calcMonths(P, annualRate, M) {
  const r = annualRate / 100 / 12;
  if (r === 0) return P / M;
  if (M <= P * r) return null;
  return Math.log(M / (M - P*r)) / Math.log(1+r);
}
function buildAmortTable(P, annualRate, n, M) {
  const r = annualRate / 100 / 12;
  let balance = P, rows = '';
  for (let i = 1; i <= Math.min(n, 360); i++) {
    const interest = balance * r;
    const principal = M - interest;
    balance = Math.max(balance - principal, 0);
    rows += `<tr><td>${i}</td><td class="td-interest">$${fmt(interest)}</td><td class="td-principal">$${fmt(principal)}</td><td>$${fmt(balance)}</td></tr>`;
  }
  return `<table><thead><tr><th>ماه</th><th>سود</th><th>اصل</th><th>مانده</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function calculate() {
  document.getElementById('error-msg').classList.remove('show');
  const P = getRaw('principal');
  const rate = getRaw('rate');
  const n = getRaw('months');
  const M = getRaw('monthly');
  let resultValue, resultLabel, P2, r2, n2, M2;

  if (unknown === 'monthly') {
    if (!P || !rate || !n) return showError('لطفاً مبلغ وام، نرخ بهره و مدت بازپرداخت رو وارد کن');
    M2 = calcMonthly(P, rate, n); P2=P; r2=rate; n2=n;
    resultValue = '$' + fmt(M2); resultLabel = 'قسط ماهانه';
  } else if (unknown === 'rate') {
    if (!P || !M || !n) return showError('لطفاً مبلغ وام، قسط ماهانه و مدت بازپرداخت رو وارد کن');
    if (M * n <= P) return showError('قسط ماهانه خیلی کمه');
    r2 = calcRate(P, M, n);
    if (!r2 || r2 < 0) return showError('با این اعداد نرخ بهره قابل محاسبه نیست');
    P2=P; M2=M; n2=n; resultValue = fmt(r2) + '%'; resultLabel = 'نرخ بهره سالانه';
  } else if (unknown === 'principal') {
    if (!rate || !M || !n) return showError('لطفاً نرخ بهره، قسط ماهانه و مدت بازپرداخت رو وارد کن');
    P2 = calcPrincipal(M, rate, n); r2=rate; M2=M; n2=n;
    resultValue = '$' + fmt(P2); resultLabel = 'مبلغ وام';
  } else if (unknown === 'months') {
    if (!P || !rate || !M) return showError('لطفاً مبلغ وام، نرخ بهره و قسط ماهانه رو وارد کن');
    n2 = calcMonths(P, rate, M);
    if (!n2 || n2 < 0) return showError('با این اعداد مدت بازپرداخت قابل محاسبه نیست');
    n2 = Math.ceil(n2); M2 = calcMonthly(P, rate, n2); P2=P; r2=rate;
    resultValue = n2 + ' ماه'; resultLabel = 'مدت بازپرداخت';
  }

  const totalPaid = M2 * n2;
  const totalInterest = totalPaid - P2;
  document.getElementById('result-main').innerHTML = `<span>${resultLabel}:</span>${resultValue}`;
  document.getElementById('result-grid').innerHTML = `
    <div class="result-item"><div class="label">کل پرداختی</div><div class="value">$${fmt(totalPaid)}</div></div>
    <div class="result-item"><div class="label">کل سود پرداختی</div><div class="value red">$${fmt(totalInterest)}</div></div>
    <div class="result-item"><div class="label">اصل وام</div><div class="value green">$${fmt(P2)}</div></div>
    <div class="result-item"><div class="label">مدت کل</div><div class="value">${n2} ماه (${(n2/12).toFixed(1)} سال)</div></div>`;
  document.getElementById('amort-table').innerHTML = buildAmortTable(P2, r2, n2, M2);
  document.getElementById('amort-table').classList.remove('show');
  document.getElementById('amort-toggle').textContent = 'جدول اقساط ▼';
  document.getElementById('result-box').classList.add('show');
}

function toggleAmort() {
  const t = document.getElementById('amort-table');
  const btn = document.getElementById('amort-toggle');
  t.classList.toggle('show');
  btn.textContent = t.classList.contains('show') ? 'جدول اقساط ▲' : 'جدول اقساط ▼';
}

setUnknown('monthly');
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
